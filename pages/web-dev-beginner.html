<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beginner Web Dev Checklist</title>
    <link rel="stylesheet" href="../css/web-dev-beginner.css" />
  </head>
  <body>
    <h1>Web Dev Starter 🌱</h1>
    <p class="subtitle">
      A simple checklist to get you going. Check tasks to mark them done.
    </p>

    <div class="section-title">HTML</div>

    <label class="task">
      <input type="checkbox" />
      <div>
        <div class="name">Learn basic HTML tags</div>
        <div class="desc">headings, paragraphs, links, images, lists</div>
      </div>
    </label>

    <label class="task">
      <input type="checkbox" />
      <div>
        <div class="name">Understand HTML structure</div>
        <div class="desc">
          &lt;html&gt;, &lt;head&gt;, &lt;body&gt; and how they fit together
        </div>
      </div>
    </label>

    <label class="task">
      <input type="checkbox" />
      <div>
        <div class="name">Build a simple webpage</div>
        <div class="desc">
          An "About Me" page with your name and a few details
        </div>
      </div>
    </label>

    <div class="section-title">CSS</div>

    <label class="task">
      <input type="checkbox" />
      <div>
        <div class="name">Learn basic CSS properties</div>
        <div class="desc">color, font-size, background, margin, padding</div>
      </div>
    </label>

    <label class="task">
      <input type="checkbox" />
      <div>
        <div class="name">Understand the box model</div>
        <div class="desc">
          How content, padding, border, and margin work together
        </div>
      </div>
    </label>

    <label class="task">
      <input type="checkbox" />
      <div>
        <div class="name">Style your webpage</div>
        <div class="desc">
          Add colors, fonts, and spacing to your "About Me" page
        </div>
      </div>
    </label>

    <div class="section-title">First Steps</div>

    <label class="task">
      <input type="checkbox" />
      <div>
        <div class="name">Set up VS Code</div>
        <div class="desc">Install the editor and the Live Server extension</div>
      </div>
    </label>

    <label class="task">
      <input type="checkbox" />
      <div>
        <div class="name">Learn Git basics</div>
        <div class="desc">init, add, commit — save your work properly</div>
      </div>
    </label>

    <label class="task">
      <input type="checkbox" />
      <div>
        <div class="name">Put a project on GitHub</div>
        <div class="desc">Create a repo and push your first webpage online</div>
      </div>
    </label>
  </body>
</html>
